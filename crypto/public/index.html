<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte Offline Antananarivo</title>
  <link href="https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@5.18.0/dist/maplibre-gl.js"></script>
  <style>
    html, body, #map {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #d9e5cf;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: '/styles/bright/style.json',
      center: [47.5079, -18.8792],
      zoom: 12,
      minZoom: 12,
      maxZoom: 14,
      maxBounds: [[47.37, -19.025], [47.679, -18.772]]
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-left');

    map.on('error', (event) => {
      console.error('MapLibre rendering error:', event && event.error ? event.error : event);
    });
  </script>
</body>
</html>
